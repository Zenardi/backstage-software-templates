apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ${{values.app_name}}
  namespace: ${{values.system.split('/')[1]}}
  labels:
    app.kubernetes.io/name: ${{values.app_name}}
    app: ${{values.app_name}}
spec:
  groups:
    - name: ${{values.app_name}}-rules
      rules:
        - alert: HighErrorRate
          expr: sum(rate(http_server_requests_seconds_count{container="${{values.app_name}}",namespace="${{values.system.split('/')[1]}}", status=~"5.."}[5m])) / sum(rate(http_server_requests_seconds_count{container="${{values.app_name}}",namespace="${{values.system.split('/')[1]}}"}[5m])) > 0.05
          for: 10m
          labels:
            severity: critical
            app: ${{values.app_name}}
          annotations:
            summary: "High error rate detected for ${{values.app_name}}"
            description: "More than 5% of requests are failing with 5xx status codes over the last 10 minutes."
        - alert: HighLatency
          expr: histogram_quantile(0.95, sum by (le) (rate(http_server_requests_seconds_bucket{container="${{values.app_name}}", namespace="${{values.system.split('/')[1]}}"}[5m]))) > 0.5
          for: 10m
          labels:
            severity: warning
            app: ${{values.app_name}}
          annotations:
            summary: "High latency detected for ${{values.app_name}}"
            description: "95th percentile latency is above 500ms over the last 10 minutes."
        - alert: InstanceDown
          expr: up{service="${{values.app_name}}", namespace="${{values.system.split('/')[1]}}",container="${{values.app_name}}"} == 0
          for: 5m
          labels:
            severity: critical
            app: ${{values.app_name}}
          annotations:
            summary: "Instance down for ${{values.app_name}}"
            description: "No instances of ${{values.app_name}} have been up for the last 5 minutes."
        - alert: HighMemoryUsage
          expr: (sum by (namespace, pod, service) (jvm_memory_used_bytes{area="heap", namespace="${{values.system.split('/')[1]}}", service="${{values.app_name}}"}) / sum by (namespace, pod, service) (jvm_memory_max_bytes{area="heap", namespace="${{values.system.split('/')[1]}}", service="${{values.app_name}}"})) * 100 > 80
          for: 10m
          labels:
            severity: warning
            app: ${{values.app_name}}
          annotations:
            summary: "High memory usage detected for ${{values.app_name}}"
            description: "Memory usage is above 80% for the last 10 minutes."
        - alert: HighCPUUsage
          expr: process_cpu_usage{job="${{values.app_name}}", namespace="${{values.system.split('/')[1]}}", service="${{values.app_name}}"} > 0.8
          for: 10m
          labels:
            severity: warning
            app: ${{values.app_name}}
          annotations:
            summary: "High CPU usage detected for ${{values.app_name}}"
            description: "CPU usage is above 80% for the last 10 minutes."
        - alert: CrashLoopingPods
          expr: increase(kube_pod_container_status_restarts_total{container=~"${{values.app_name}}", namespace="${{values.system.split('/')[1]}}"}[10m]) > 3
          for: 10m
          labels:
            severity: critical
            app: ${{values.app_name}}
          annotations:
            summary: "Crash looping pods detected for ${{values.app_name}}"
            description: "Pods are restarting more than 3 times in the last 10 minutes." 
        