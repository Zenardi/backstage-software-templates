name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ '${{ secrets.DOCKERHUB_USERNAME }}' }}
          password: ${{ '${{ secrets.DOCKERHUB_TOKEN }}' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ '${{ secrets.DOCKERHUB_USERNAME }}' }}/${{values.app_name}}:latest

  deploy-to-k8s:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install kubectl
        shell: bash
        run: |
          curl -sSL -o /tmp/kubectl https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl
          chmod +x /tmp/kubectl
          sudo mv /tmp/kubectl /usr/local/bin/kubectl

      - name: Install argocd
        shell: bash
        run: |
          curl -sSL -o /tmp/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /tmp/argocd
          sudo mv /tmp/argocd /usr/local/bin/argocd

      # - name: Install grafanactl
      #   run: |
      #     # Download and install grafanactl
      #     GRAFANACTL_VERSION="0.1.8"
          
      #     GRAFANACTL_URL="https://github.com/grafana/grafanactl/releases/download/v0.1.8/grafanactl_Linux_x86_64.tar.gz"
      #     curl -sL "${GRAFANACTL_URL}" -o grafanactl.tar.gz
      #     tar -xzf grafanactl.tar.gz grafanactl
      #     chmod +x grafanactl
      #     sudo mv grafanactl /usr/local/bin/
      #     grafanactl --version

      - name: argocd login
        shell: bash
        run: |
          argocd login argocd-server.argocd \
            --plaintext \
            --grpc-web \
            --username admin \
            --password ${{ '${{ secrets.ARGOCD_PASSWORD }}' }}

      - name: Ensure ArgoCD Project
        shell: bash
        run: |
          kubectl apply -f argocd/project.yaml

      - name: Ensure ArgoCD Application
        shell: bash
        run: |
          kubectl apply -f argocd/application.yaml
      
      - name: Ensure Namespace Exists
        shell: bash
        run: |
          NAMESPACE="${{values.system.split('/')[1]}}"
          echo "Creating namespace: $NAMESPACE"
          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

          # Wait for namespace to be ready (max 30 seconds)
          for i in {1..30}; do
            if kubectl get namespace "$NAMESPACE" &>/dev/null; then
              echo "✓ Namespace $NAMESPACE is ready"
              exit 0
            fi
            echo "Waiting for namespace to be created... ($i/30)"
            sleep 1
          done

          echo "✗ Namespace creation timeout after 30 seconds"
          exit 1
          
      - name: Deploy to Local Cluster
        run: |
          echo "🚀 Applying manifests from k8s/ folder..."
          kubectl apply -f k8s/
          
          echo "⏳ Waiting for rollout..."
          kubectl rollout status deployment/${{values.app_name}} -n ${{values.system.split('/')[1]}} --timeout=90s

