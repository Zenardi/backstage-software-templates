apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: react-ts-app-ado
  title: Create React App (Azure DevOps)
  description: Provision a React (TypeScript) application with an Azure Pipelines CI/CD pipeline and deploy in Kubernetes
  tags:
    - react
    - typescript
    - kubernetes
    - azure-devops
spec:
  owner: group:default/platform-engineering
  type: service

  parameters:
    - title: App Info
      required:
        - component_id
        - environment
        - app_description
        - owner
        - system
      properties:

        component_id:
          title: Component name
          type: string
          description: App name — also used as the repository name in Azure DevOps
          pattern: '^([a-zA-Z][a-zA-Z0-9]*)(-[a-zA-Z0-9]+)*$'

        app_description:
          title: Application Description
          type: string
          description: A short description of the application

        environment:
          title: Environment
          type: string
          description: The environment where this component will be deployed
          enum:
            - poc
            - dev
            - staging
            - prod

        owner:
          title: Owner
          type: string
          description: The owner of the component.
          ui:field: OwnerPicker
          ui:options:
            allowedKinds:
              - Group
              - User

        system:
          title: System or Project Responsible
          type: string
          description: The system or project this resource belongs to.
          ui:field: OwnerPicker
          ui:options:
            allowArbitraryValues: false
            catalogFilter:
              - kind: System
                'spec.domain': spacetech

    - title: Container Registry
      required:
        - registry_type
        - variable_group
      properties:
        registry_type:
          title: Registry Type
          type: string
          description: Where container images will be pushed
          enum:
            - dockerhub
            - acr
          enumNames:
            - Docker Hub
            - Azure Container Registry (ACR)

        variable_group:
          title: Variable Group Name
          type: string
          description: "ADO variable group containing DOCKER_HUB_USERNAME and DOCKER_HUB_PAT (or ACR credentials). Create it in Pipelines → Library before running this template."
          default: docker-hub-creds

      dependencies:
        registry_type:
          oneOf:
            - properties:
                registry_type:
                  enum:
                    - dockerhub
                docker_hub_username:
                  title: Docker Hub Username
                  type: string
                  description: "Your Docker Hub username (used to construct the image reference in k8s manifests)"
              required:
                - docker_hub_username
            - properties:
                registry_type:
                  enum:
                    - acr
                registry_host:
                  title: ACR Registry Host
                  type: string
                  description: "e.g. myregistry.azurecr.io"
              required:
                - registry_host

    - title: Source Code Repository
      required:
        - ado_organization
        - ado_project
        - ado_agent_pool
      properties:
        ado_organization:
          title: Azure DevOps Organization
          type: string
          description: The Azure DevOps organization name (e.g. Zenardi)

        ado_project:
          title: Azure DevOps Project
          type: string
          description: The Azure DevOps project where the repository will be created

        ado_agent_pool:
          title: Agent Pool Name
          type: string
          description: The Azure DevOps self-hosted agent pool used for the CD stage (must run inside the KIND cluster)
          default: kind-backstage

    - title: Kubernetes Deployment Specs
      required:
        - targetCluster
        - deploy_replicas
        - domain_name
        - hpa_min_replicas
        - hpa_max_replicas
        - hpa_avg_cpu_utilization
      properties:

        targetCluster:
          title: Deploy To Kubernetes Cluster
          type: string
          description: Pick Kubernetes Cluster
          ui:field: EntityPicker
          ui:options:
            allowArbitraryValues: false
            catalogFilter:
              - kind: Resource
                'spec.type': kubernetes-cluster

        deploy_replicas:
          title: Deployment Replicas
          type: number
          description: Number of replicas for the deployment
          default: 2
        hpa_min_replicas:
          title: Horizontal Pod Autoscaler Minimum Replicas
          type: number
          description: Minimum number of replicas for the HPA
          default: 1
        hpa_max_replicas:
          title: Horizontal Pod Autoscaler Maximum Replicas
          type: number
          description: Maximum number of replicas for the HPA
          default: 5
        hpa_avg_cpu_utilization:
          title: Horizontal Pod Autoscaler Average CPU Utilization
          type: number
          description: Average CPU utilization percentage for triggering scaling (0-100)
          default: 70
        hpa_avg_memory_utilization:
          title: Horizontal Pod Autoscaler Average Memory Utilization
          type: number
          description: Average Memory utilization percentage for triggering scaling (0-100)
          default: 70
        domain_name:
          title: Domain Name
          type: string
          description: The domain name for the application
          default: local.com


  steps:
    - id: fetch-base
      name: Fetch Base
      action: fetch:template
      input:
        url: ./template
        values:
          app_name: ${{parameters.component_id}}
          app_description: ${{parameters.app_description}}
          app_env: ${{parameters.environment}}
          deploy_replicas: ${{parameters.deploy_replicas}}
          domain_name: ${{parameters.domain_name}}
          hpa_min_replicas: ${{parameters.hpa_min_replicas}}
          hpa_max_replicas: ${{parameters.hpa_max_replicas}}
          hpa_avg_cpu_utilization: ${{parameters.hpa_avg_cpu_utilization}}
          hpa_avg_memory_utilization: ${{parameters.hpa_avg_memory_utilization}}
          destination:
            host: dev.azure.com
            owner: ${{parameters.ado_organization}}
            project: ${{parameters.ado_project}}
            repo: ${{parameters.component_id}}
          ado_organization: ${{parameters.ado_organization}}
          ado_project: ${{parameters.ado_project}}
          ado_agent_pool: ${{parameters.ado_agent_pool}}
          targetCluster: ${{parameters.targetCluster}}
          owner: ${{parameters.owner}}
          system: ${{parameters.system}}
          registry_type: ${{parameters.registry_type}}
          variable_group: ${{parameters.variable_group}}
          registry_host: ${{parameters.registry_host if parameters.registry_host else ""}}
          docker_hub_username: ${{parameters.docker_hub_username if parameters.docker_hub_username else ""}}

    - id: publish
      name: Publish
      action: publish:azure
      input:
        description: "A React (TypeScript) application: ${{ parameters.component_id }}"
        repoUrl: "dev.azure.com?organization=${{ parameters.ado_organization }}&owner=${{ parameters.ado_organization }}&repo=${{ parameters.component_id }}&project=${{ parameters.ado_project }}"
        defaultBranch: main

    - id: create-pipeline
      name: Create and Trigger Azure Pipeline
      action: azure:pipeline:create-and-run
      input:
        organization: ${{ parameters.ado_organization }}
        project: ${{ parameters.ado_project }}
        repoName: ${{ parameters.component_id }}
        pipelineName: ${{ parameters.component_id }}-cicd
        agentPoolName: ${{ parameters.ado_agent_pool }}
        pipelineYamlPath: azure-pipelines.yml

    - id: register
      name: Register
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: "/catalog-info.yaml"

  output:
    links:
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
        icon: scaffolder
      - title: Pipeline
        url: ${{ steps['create-pipeline'].output.pipelineUrl }}
        icon: scaffolder
      - title: Pipeline Run
        url: ${{ steps['create-pipeline'].output.runUrl }}
        icon: scaffolder
